<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Taylor Swift 歌曲对战锦标赛 — 128 首歌曲角逐冠军" />
  <meta name="theme-color" content="#0E0B0F" />
  <title>Taylor Swift 歌曲对战锦标赛</title>

  <!-- Google Fonts: Fraunces（复古衬线display）+ Inter Tight（现代无衬线body）+ JetBrains Mono（数字） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">跳到主内容</a>
  <!-- 背景粒子流场 canvas（低频、性能优先） -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- 装饰 SVG：蛇形流动曲线（reputation 致敬）+ 星形（showgirl） -->
  <svg class="deco-snake" aria-hidden="true" viewBox="0 0 400 1200" preserveAspectRatio="none">
    <path d="M -20 100 C 100 200, 300 50, 420 250 S 100 450, -20 400 S 300 650, 420 600 S 100 850, -20 800 S 300 1050, 420 1000"
          fill="none" stroke="rgba(212,175,55,0.10)" stroke-width="1.2" />
    <path d="M 420 150 C 300 250, 100 100, -20 300 S 300 500, 420 450 S 100 700, -20 650 S 300 950, 420 900"
          fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1" />
  </svg>

  <svg class="deco-star deco-star-1" aria-hidden="true" viewBox="0 0 24 24">
    <path d="M12 2 L13.5 9 L21 10.5 L13.5 12 L12 22 L10.5 12 L3 10.5 L10.5 9 Z" fill="rgba(212,175,55,0.18)" />
  </svg>
  <svg class="deco-star deco-star-2" aria-hidden="true" viewBox="0 0 24 24">
    <path d="M12 2 L13.5 9 L21 10.5 L13.5 12 L12 22 L10.5 12 L3 10.5 L10.5 9 Z" fill="rgba(212,175,55,0.12)" />
  </svg>

  <!-- 顶部光晕 -->
  <div class="top-glow" aria-hidden="true"></div>

  <!-- ============ 顶部：标题 + 进度条 + 轮次提示 ============ -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="title-main">Taylor Swift</span>
        <span class="title-sub">歌曲对战锦标赛</span>
      </h1>
      <div class="era-badge" id="era-badge"><span class="era-dot"></span><span id="era-text">Round 1</span></div>

      <!-- 进度条：总体进度（Z/127）+ 当前轮进度（X/Y） -->
      <div class="progress-block">
        <div class="progress-row">
          <span class="progress-label">总体进度</span>
          <span class="progress-count" id="overall-count">0 / 127</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-label="总体进度">
          <div class="progress-fill overall" id="overall-fill"></div>
        </div>
        <div class="progress-row progress-row--round">
          <span class="progress-label" id="round-label">Round 1 · 0 / 64</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-label="当前轮进度">
          <div class="progress-fill round" id="round-fill"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ============ 主区域 ============ -->
  <main class="site-main" id="main-content">

    <!-- 对战区：两张卡片 + VS -->
    <section id="battle" class="view view--active" aria-label="对战区">
      <div class="match-header">
        <span class="match-no" id="match-no">M1</span>
        <span class="match-title" id="match-title">Round 1 · 第 1 场</span>
      </div>
      <div class="battle-arena" id="battle-arena">
        <!-- 卡片由 app.js 动态注入 -->
      </div>
    </section>

    <!-- 轮次过渡（隐藏，轮次完成时显示） -->
    <section id="round-transition" class="view view--transition" aria-label="轮次过渡" hidden>
      <div class="transition-card">
        <div class="transition-eyebrow">Round Complete</div>
        <h2 class="transition-title" id="transition-title">Round 1 Complete</h2>
        <p class="transition-desc" id="transition-desc">64 首歌曲晋级，进入下一轮</p>
        <button class="btn btn--primary" id="btn-continue-round" type="button">继续</button>
      </div>
    </section>

    <!-- 冠军揭晓页（隐藏） -->
    <section id="champion" class="view view--champion" aria-label="冠军揭晓" hidden>
      <canvas id="confetti-canvas" aria-hidden="true"></canvas>
      <div class="champion-wrap">
        <div class="champion-eyebrow">Champion</div>
        <h2 class="champion-heading">最终冠军</h2>
        <div class="champion-card" id="champion-card"><!-- 由 app.js 注入 --></div>
        <div class="champion-actions">
          <button class="btn btn--primary" id="btn-view-bracket" type="button">查看对战树</button>
          <button class="btn btn--ghost" id="btn-restart-champion" type="button">重新开始</button>
        </div>
      </div>
    </section>

    <!-- 对战树（默认隐藏，可切换查看） -->
    <section id="bracket-view" class="view view--bracket" aria-label="对战树" hidden>
      <div class="bracket-head">
        <div class="bracket-head-text">
          <h2 class="bracket-title">对战树</h2>
          <p class="bracket-sub">共 127 场 · 7 轮 · 双指缩放拖拽</p>
        </div>
        <div class="bracket-head-actions">
          <div class="size-toggle" role="group" aria-label="比赛规模">
            <button class="size-btn" type="button" data-size-btn="128">128 首</button>
            <button class="size-btn" type="button" data-size-btn="64">64 首</button>
          </div>
          <button class="bracket-ctrl-btn bracket-ctrl-btn--reset" id="btn-reset" type="button" aria-label="重置">↻ 重置</button>
        </div>
      </div>
      <div class="bracket-toolbar">
        <button class="bracket-ctrl-btn" id="btn-tree-fit" type="button" aria-label="重置视图">适应屏幕</button>
        <button class="bracket-ctrl-btn" id="btn-tree-focus" type="button" aria-label="聚焦当前轮">聚焦当前</button>
        <button class="bracket-ctrl-btn" id="btn-tree-zoom-in" type="button" aria-label="放大">+</button>
        <button class="bracket-ctrl-btn" id="btn-tree-zoom-out" type="button" aria-label="缩小">−</button>
      </div>
      <div class="bracket-viewport" id="bracket-viewport">
        <div class="bracket-world" id="bracket-container">
          <!-- 由 bracket.js 动态注入 SVG 连接线 + DOM 节点 -->
        </div>
      </div>
      <div class="bracket-legend" aria-hidden="true">
        <span class="legend-item"><span class="legend-dot legend-win"></span>胜者晋级</span>
        <span class="legend-item"><span class="legend-dot legend-lose"></span>已淘汰</span>
        <span class="legend-item"><span class="legend-dot legend-pending"></span>待定</span>
        <span class="legend-item"><span class="legend-dot legend-current"></span>当前轮</span>
      </div>
    </section>

  </main>

  <!-- ============ 底部导航：对战 / 对战表切换 ============ -->
  <nav class="site-nav" aria-label="主导航">
    <button class="nav-btn nav-btn--active" id="nav-battle" type="button" data-view="battle">
      <span class="nav-icon" aria-hidden="true">⚔</span>
      <span class="nav-label">对战</span>
    </button>
    <button class="nav-btn" id="nav-bracket" type="button" data-view="bracket-view">
      <span class="nav-icon" aria-hidden="true">⊞</span>
      <span class="nav-label">对战树</span>
    </button>
  </nav>

  <!-- 脚本：先数据，后逻辑 -->
  <script src="scripts/songs-data.js"></script>
  <script src="scripts/preset-previews.js"></script>
  <script src="scripts/bracket.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
